{% extends "faculty/layout.html" %}
{% block title %}Faculty Dashboard — SECE{% endblock %}
{% block faculty_content %}
<h2>Faculty Dashboard</h2>
<p class="muted">{{ faculty.name }}</p>

<div class="stats-grid">
  <div class="stat-card">
    <p class="stat-label">Students</p>
    <p class="stat-value">{{ student_count }}</p>
  </div>
  <div class="stat-card">
    <p class="stat-label">Sessions</p>
    <p class="stat-value">{{ session_count }}</p>
    <p class="stat-sub">dates marked</p>
  </div>
  <div class="stat-card">
    <p class="stat-label">Below 75%</p>
    <p class="stat-value text-red">{{ shortage }}</p>
  </div>
</div>
{% endblock %}
